<svg width="860" height="540" viewBox="0 0 860 540" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="GitHub profile terminal">
  <style>
    .bg       { fill: #1a1b27; }
    .titlebar { fill: #13141f; }
    .text     { fill: #a9b1d6; font-family: 'Courier New', Consolas, monospace; font-size: 18px; }
    .key      { fill: #7aa2f7; }
    .val      { fill: #bb9af7; }
    .accent   { fill: #9ece6a; }
    .sep      { fill: #565f89; }
    .add      { fill: #9ece6a; }
    .del      { fill: #f7768e; }
    .title    { fill: #565f89; font-family: 'Courier New', Consolas, monospace; font-size: 15px; }

    .line { opacity: 0; animation: fadein 0.5s ease forwards; }
    .line:nth-of-type(1)  { animation-delay: 0.30s; }
    .line:nth-of-type(2)  { animation-delay: 0.45s; }
    .line:nth-of-type(3)  { animation-delay: 0.60s; }
    .line:nth-of-type(4)  { animation-delay: 0.75s; }
    .line:nth-of-type(5)  { animation-delay: 0.90s; }
    .line:nth-of-type(6)  { animation-delay: 1.05s; }
    .line:nth-of-type(7)  { animation-delay: 1.20s; }
    .line:nth-of-type(8)  { animation-delay: 1.35s; }
    .line:nth-of-type(9)  { animation-delay: 1.50s; }
    .line:nth-of-type(10) { animation-delay: 1.65s; }
    .line:nth-of-type(11) { animation-delay: 1.80s; }
    .line:nth-of-type(12) { animation-delay: 1.95s; }

    @keyframes fadein { from { opacity: 0; transform: translateX(8px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes blink  { 50% { opacity: 0; } }
    .cursor { animation: blink 1s step-end infinite; }
  </style>

  <rect class="bg" x="0" y="0" width="860" height="540" rx="14"/>
  <rect class="titlebar" x="0" y="0" width="860" height="40" rx="14"/>
  <rect class="titlebar" x="0" y="20" width="860" height="20"/>
  <circle cx="26" cy="20" r="7" fill="#f7768e"/>
  <circle cx="50" cy="20" r="7" fill="#e0af68"/>
  <circle cx="74" cy="20" r="7" fill="#9ece6a"/>
  <text class="title" x="430" y="25" text-anchor="middle">— bash —</text>

  <g transform="translate(40, 86)">
    <text class="text line" x="0" y="0"><tspan class="accent">user</tspan>@<tspan class="accent">github</tspan></text>
    <text class="text line sep" x="0" y="26">-----------------</text>

    <text class="text line" x="0" y="58"><tspan class="key">OS</tspan>: Linux x86_64</text>
    <text class="text line" x="0" y="84"><tspan class="key">Uptime</tspan>: <tspan class="val"><!--uptime-->? years, ? days<!--/uptime--></tspan></text>
    <text class="text line" x="0" y="110"><tspan class="key">Editor</tspan>: VS Code, Neovim</text>
    <text class="text line" x="0" y="136"><tspan class="key">Languages</tspan>: Python, JavaScript, TypeScript, Go</text>

    <text class="text line sep" x="0" y="172">-----------------</text>

    <text class="text line" x="0" y="204"><tspan class="key">Repos</tspan>: <tspan class="val"><!--repos-->0<!--/repos--></tspan> <tspan class="sep">{ Contributed: </tspan><tspan class="val"><!--contributed-->0<!--/contributed--></tspan><tspan class="sep"> }</tspan></text>
    <text class="text line" x="0" y="230"><tspan class="key">Commits</tspan>: <tspan class="val"><!--commits-->0<!--/commits--></tspan></text>
    <text class="text line" x="0" y="256"><tspan class="key">Stars</tspan>: <tspan class="val"><!--stars-->0<!--/stars--></tspan></text>
    <text class="text line" x="0" y="282"><tspan class="key">Followers</tspan>: <tspan class="val"><!--followers-->0<!--/followers--></tspan></text>
    <text class="text line" x="0" y="308"><tspan class="key">Lines of code</tspan>: <tspan class="val"><!--loc-->0<!--/loc--></tspan> <tspan class="sep">(</tspan><tspan class="add"><!--loc_add-->0<!--/loc_add-->++</tspan><tspan class="sep">, </tspan><tspan class="del"><!--loc_del-->0<!--/loc_del-->--</tspan><tspan class="sep">)</tspan></text>

    <text class="text line accent" x="0" y="350">$ <tspan class="cursor">█</tspan></text>
  </g>
</svg>
