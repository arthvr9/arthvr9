<svg width="880" height="600" viewBox="0 0 880 600" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="GitHub profile terminal">
  <style>
    .bg       { fill: #ffffff; }
    .titlebar { fill: #f0f2f5; }
    .text     { fill: #24292f; font-family: 'Courier New', Consolas, monospace; font-size: 18px; }
    .key      { fill: #0969da; }
    .val      { fill: #8250df; }
    .accent   { fill: #1a7f37; }
    .sep      { fill: #6e7781; }
    .add      { fill: #1a7f37; }
    .del      { fill: #cf222e; }
    .title    { fill: #6e7781; font-family: 'Courier New', Consolas, monospace; font-size: 15px; }

    .line { opacity: 0; animation: fadein 0.5s ease forwards; }
    .line:nth-of-type(1)  { animation-delay: 0.30s; }
    .line:nth-of-type(2)  { animation-delay: 0.42s; }
    .line:nth-of-type(3)  { animation-delay: 0.54s; }
    .line:nth-of-type(4)  { animation-delay: 0.66s; }
    .line:nth-of-type(5)  { animation-delay: 0.78s; }
    .line:nth-of-type(6)  { animation-delay: 0.90s; }
    .line:nth-of-type(7)  { animation-delay: 1.02s; }
    .line:nth-of-type(8)  { animation-delay: 1.14s; }
    .line:nth-of-type(9)  { animation-delay: 1.26s; }
    .line:nth-of-type(10) { animation-delay: 1.38s; }
    .line:nth-of-type(11) { animation-delay: 1.50s; }
    .line:nth-of-type(12) { animation-delay: 1.62s; }
    .line:nth-of-type(13) { animation-delay: 1.74s; }
    .line:nth-of-type(14) { animation-delay: 1.86s; }
    .line:nth-of-type(15) { animation-delay: 1.98s; }
    .line:nth-of-type(16) { animation-delay: 2.10s; }
    .line:nth-of-type(17) { animation-delay: 2.22s; }
    .line:nth-of-type(18) { animation-delay: 2.34s; }
    .line:nth-of-type(19) { animation-delay: 2.46s; }

    @keyframes fadein { from { opacity: 0; transform: translateX(8px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes blink  { 50% { opacity: 0; } }
    .cursor { animation: blink 1s step-end infinite; }
  </style>

  <rect class="bg" x="0" y="0" width="880" height="600" rx="14"/>
  <rect class="titlebar" x="0" y="0" width="880" height="40" rx="14"/>
  <rect class="titlebar" x="0" y="20" width="880" height="20"/>
  <circle cx="26" cy="20" r="7" fill="#ff5f57"/>
  <circle cx="50" cy="20" r="7" fill="#febc2e"/>
  <circle cx="74" cy="20" r="7" fill="#28c840"/>
  <text class="title" x="440" y="25" text-anchor="middle">arthur@gran-coffee: ~</text>

  <g transform="translate(40, 70)">
    <text class="text line" x="0" y="0"><tspan class="accent">arthur</tspan>@<tspan class="accent">github</tspan></text>
    <text class="text line sep" x="0" y="26">--------------------------</text>

    <text class="text line" x="0" y="52"><tspan class="key">OS</tspan>: Linux Mint</text>
    <text class="text line" x="0" y="78"><tspan class="key">Host</tspan>: Gran Coffee</text>
    <text class="text line" x="0" y="104"><tspan class="key">Role</tspan>: Full Stack Developer</text>
    <text class="text line" x="0" y="130"><tspan class="key">Uptime</tspan>: <tspan class="val"><!--uptime-->? years, ? days<!--/uptime--></tspan></text>
    <text class="text line" x="0" y="156"><tspan class="key">IDE</tspan>: Zed</text>
    <text class="text line" x="0" y="182"><tspan class="key">Languages.Programming</tspan>: Flutter, TypeScript, C++</text>
    <text class="text line" x="0" y="208"><tspan class="key">Languages.Human</tspan>: Portuguese, English</text>
    <text class="text line" x="0" y="234"><tspan class="key">Hobbies</tspan>: C++, Game Hacking, Video Editing</text>
    <text class="text line" x="0" y="260"><tspan class="key">Email</tspan>: arthurrodrigues.dev@gmail.com</text>
    <text class="text line" x="0" y="286"><tspan class="key">LinkedIn</tspan>: in/arthur-rodrigues808</text>

    <text class="text line sep" x="0" y="312">--------------------------</text>

    <text class="text line" x="0" y="338"><tspan class="key">Repos</tspan>: <tspan class="val"><!--repos-->0<!--/repos--></tspan> <tspan class="sep">{ Contributed: </tspan><tspan class="val"><!--contributed-->0<!--/contributed--></tspan><tspan class="sep"> }</tspan></text>
    <text class="text line" x="0" y="364"><tspan class="key">Commits</tspan>: <tspan class="val"><!--commits-->0<!--/commits--></tspan></text>
    <text class="text line" x="0" y="390"><tspan class="key">Stars</tspan>: <tspan class="val"><!--stars-->0<!--/stars--></tspan></text>
    <text class="text line" x="0" y="416"><tspan class="key">Followers</tspan>: <tspan class="val"><!--followers-->0<!--/followers--></tspan></text>
    <text class="text line" x="0" y="442"><tspan class="key">Lines of code</tspan>: <tspan class="val"><!--loc-->0<!--/loc--></tspan> <tspan class="sep">(</tspan><tspan class="add"><!--loc_add-->0<!--/loc_add-->++</tspan><tspan class="sep">, </tspan><tspan class="del"><!--loc_del-->0<!--/loc_del-->--</tspan><tspan class="sep">)</tspan></text>

    <text class="text line accent" x="0" y="468">$ <tspan class="cursor">█</tspan></text>
  </g>
</svg>
