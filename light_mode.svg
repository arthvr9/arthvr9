<svg width="1000" height="600" viewBox="0 0 1000 600" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="GitHub profile terminal">
  <style>
    .bg       { fill: #ffffff; }
    .titlebar { fill: #f0f2f5; }
    .text     { fill: #24292f; font-family: 'Courier New', Consolas, monospace; font-size: 18px; }
    .key      { fill: #0969da; }
    .val      { fill: #8250df; }
    .accent   { fill: #1a7f37; }
    .sep      { fill: #6e7781; }
    .add      { fill: #1a7f37; }
    .del      { fill: #cf222e; }
    .title    { fill: #6e7781; font-family: 'Courier New', Consolas, monospace; font-size: 15px; }
    .art      { fill: #24292f; }

    .line { opacity: 0; animation: fadein 0.5s ease forwards; }
    .line:nth-of-type(1) { animation-delay: 0.30s; }
    .line:nth-of-type(2) { animation-delay: 0.42s; }
    .line:nth-of-type(3) { animation-delay: 0.54s; }
    .line:nth-of-type(4) { animation-delay: 0.66s; }
    .line:nth-of-type(5) { animation-delay: 0.78s; }
    .line:nth-of-type(6) { animation-delay: 0.90s; }
    .line:nth-of-type(7) { animation-delay: 1.02s; }
    .line:nth-of-type(8) { animation-delay: 1.14s; }
    .line:nth-of-type(9) { animation-delay: 1.26s; }
    .line:nth-of-type(10) { animation-delay: 1.38s; }
    .line:nth-of-type(11) { animation-delay: 1.50s; }
    .line:nth-of-type(12) { animation-delay: 1.62s; }
    .line:nth-of-type(13) { animation-delay: 1.74s; }
    .line:nth-of-type(14) { animation-delay: 1.86s; }
    .line:nth-of-type(15) { animation-delay: 1.98s; }
    .line:nth-of-type(16) { animation-delay: 2.10s; }
    .line:nth-of-type(17) { animation-delay: 2.22s; }
    .line:nth-of-type(18) { animation-delay: 2.34s; }
    .line:nth-of-type(19) { animation-delay: 2.46s; }

    .line-art { opacity: 0; animation: fadein 0.8s ease forwards; animation-delay: 0.1s; }
    @keyframes fadein { from { opacity: 0; transform: translateX(8px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes blink  { 50% { opacity: 0; } }
    .cursor { animation: blink 1s step-end infinite; }
  </style>

  <rect class="bg" x="0" y="0" width="1000" height="600" rx="14"/>
  <rect class="titlebar" x="0" y="0" width="1000" height="40" rx="14"/>
  <rect class="titlebar" x="0" y="20" width="1000" height="20"/>
  <circle cx="26" cy="20" r="7" fill="#ff5f57"/>
  <circle cx="50" cy="20" r="7" fill="#febc2e"/>
  <circle cx="74" cy="20" r="7" fill="#28c840"/>
